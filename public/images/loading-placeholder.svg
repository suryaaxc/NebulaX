<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#0a0e1a"/>
  <circle cx="200" cy="130" r="30" stroke="#d4af37" stroke-width="2" stroke-dasharray="8 6" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 200 130" to="360 200 130" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="130" r="16" stroke="#d4af37" stroke-width="1.5" opacity="0.25">
    <animateTransform attributeName="transform" type="rotate" from="360 200 130" to="0 200 130" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="130" r="3" fill="#d4af37" opacity="0.6"/>
  <text x="200" y="190" text-anchor="middle" fill="#4a5580" font-family="system-ui, sans-serif" font-size="13" letter-spacing="0.1em">LOADING</text>
  <rect x="160" y="205" width="80" height="1" fill="#d4af37" opacity="0.15"/>
</svg>
